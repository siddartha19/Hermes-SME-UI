<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alera — Docs</title>
    <meta name="description" content="Alera documentation — setup, the agent crew, and integrations. Rendered from the GitHub README." />
    <!-- ANALYTICS: same snippet as index.html (paste here too so docs visits count). -->
    <style>
      :root { --bg:#0b0d0c; --panel:#121514; --line:#242a27; --ink:#e9efec; --muted:#8b968f; --accent:#22c55e; --accent-dim:#16351f; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; }
      .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; }
      header { padding: 22px 0; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
      .brand { display:flex; align-items:center; gap:10px; font-weight:700; text-decoration:none; color:var(--ink); }
      .mark { width:26px; height:26px; border-radius:7px; background:var(--accent); color:#04150a; display:grid; place-items:center; font-weight:800; }
      .nav a { color:var(--muted); text-decoration:none; font-size:14px; margin-left:18px; }
      .nav a:hover { color:var(--ink); }
      .md { padding: 32px 0 80px; }
      .md h1 { font-size: 34px; letter-spacing:-0.02em; margin: 8px 0 16px; }
      .md h2 { font-size: 24px; margin: 34px 0 12px; padding-top: 16px; border-top: 1px solid var(--line); }
      .md h3 { font-size: 18px; margin: 24px 0 8px; }
      .md p, .md li { color: #cdd5d0; }
      .md a { color: var(--accent); text-decoration: none; }
      .md a:hover { text-decoration: underline; }
      .md code { background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .md pre { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; overflow: auto; }
      .md pre code { background: none; border: none; padding: 0; }
      .md img { max-width: 100%; border: 1px solid var(--line); border-radius: 10px; }
      .md table { border-collapse: collapse; width: 100%; font-size: 14px; }
      .md th, .md td { border: 1px solid var(--line); padding: 8px 10px; text-align: left; }
      .md blockquote { border-left: 3px solid var(--accent-dim); margin: 12px 0; padding: 4px 14px; color: var(--muted); }
      .loading, .err { color: var(--muted); padding: 40px 0; }
      .err a { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="/"><span class="mark">A</span> Alera</a>
        <nav class="nav">
          <a href="/">Home</a>
          <a href="https://github.com/siddartha19/Hermes-SME-UI" target="_blank" rel="noopener">Edit on GitHub ↗</a>
        </nav>
      </header>
      <div id="doc" class="md"><p class="loading">Loading docs from GitHub…</p></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const RAW = "https://raw.githubusercontent.com/siddartha19/Hermes-SME-UI/main/";
      const BLOB = "https://github.com/siddartha19/Hermes-SME-UI/blob/main/";
      const el = document.getElementById("doc");
      (async () => {
        try {
          const res = await fetch(RAW + "README.md");
          if (!res.ok) throw new Error("readme " + res.status);
          const md = await res.text();
          el.innerHTML = marked.parse(md);
          // Fix relative asset/link paths so images load and links resolve.
          el.querySelectorAll("img").forEach((img) => {
            const s = img.getAttribute("src") || "";
            if (!/^https?:|^\/\//.test(s)) img.src = RAW + s.replace(/^\.?\//, "");
          });
          el.querySelectorAll("a").forEach((a) => {
            const h = a.getAttribute("href") || "";
            if (!/^https?:|^#|^mailto:/.test(h)) a.href = BLOB + h.replace(/^\.?\//, "");
            if (/^https?:/.test(a.href)) { a.target = "_blank"; a.rel = "noopener"; }
          });
        } catch (e) {
          el.innerHTML = '<p class="err">Couldn\'t load the docs here. Read them on <a href="https://github.com/siddartha19/Hermes-SME-UI#readme">GitHub</a>.</p>';
        }
      })();
    </script>
  </body>
</html>
